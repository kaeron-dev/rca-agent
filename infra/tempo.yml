server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 48h

ingester:
  trace_idle_period: 3s
  max_block_bytes: 1_000_000
  max_block_duration: 5s
  flush_check_period: 2s
