# Server
server.port=8080

# H2
spring.datasource.url=jdbc:h2:mem:rcaagent
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Tempo
tempo.base-url=http://localhost:3200

# Prometheus
prometheus.base-url=http://localhost:9090

# LLM
llm.mode=ollama
llm.ollama.base-url=http://localhost:11434
llm.ollama.model=llama3.2

# Resilience4j — Circuit Breaker for Tempo
resilience4j.circuitbreaker.instances.tempo.sliding-window-size=10
resilience4j.circuitbreaker.instances.tempo.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tempo.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.tempo.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tempo.register-health-indicator=true

# Resilience4j — Retry for LLM
resilience4j.retry.instances.llm.max-attempts=3
resilience4j.retry.instances.llm.wait-duration=1s
resilience4j.retry.instances.llm.enable-exponential-backoff=true
resilience4j.retry.instances.llm.exponential-backoff-multiplier=2

# Resilience4j — Timeout
resilience4j.timelimiter.instances.tempo.timeout-duration=5s
resilience4j.timelimiter.instances.llm.timeout-duration=60s

# Resilience4j — Bulkhead for LLM
resilience4j.bulkhead.instances.llm.max-concurrent-calls=5
resilience4j.bulkhead.instances.llm.max-wait-duration=2s
